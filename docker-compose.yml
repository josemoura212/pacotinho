services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pacotinho
      POSTGRES_PASSWORD: pacotinho_dev
      POSTGRES_DB: pacotinho
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pacotinho"]
      interval: 5s
      timeout: 3s
      retries: 5

  init:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://pacotinho:pacotinho_dev@db:5432/pacotinho
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        echo '[1/2] Sincronizando schema...' &&
        ./node_modules/.bin/drizzle-kit push --config=drizzle.config.ts --force &&
        echo '[2/2] Rodando seed...' &&
        ./node_modules/.bin/tsx src/lib/db/seed.ts &&
        echo 'Init concluído!'
      "
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://pacotinho:pacotinho_dev@db:5432/pacotinho
    env_file:
      - .env
    volumes:
      - uploads:/app/uploads
    depends_on:
      init:
        condition: service_completed_successfully

volumes:
  pgdata:
  uploads:
